<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - Nguyễn Văn A</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html">Trang chủ</a>
        <a href="about.html">Giới thiệu</a>
        <a href="contact.html" class="active">Liên hệ</a>
    </nav>

    <main class="content-wrapper">
        <section class="contact-section">
            <h2>Kết nối với mình</h2>
            <p class="subtitle">Nếu bạn có bất kỳ thắc mắc hoặc cơ hội hợp tác nào, hãy để lại lời nhắn nhé!</p>
            
            <form id="contactForm" class="contact-form">
                <div class="form-group">
                    <label for="name">Họ và tên</label>
                    <input type="text" id="name" required placeholder="Nhập tên của bạn">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Nhập email liên hệ">
                </div>
                <div class="form-group">
                    <label for="message">Lời nhắn</label>
                    <textarea id="message" rows="5" required placeholder="Viết gì đó cho mình..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Gửi tin nhắn</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Nguyễn Văn A. Thiết kế bởi chính mình.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
